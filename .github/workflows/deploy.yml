name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latesth
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            PROJECT_DIR="/opt/boleto-seeg"
            APP_USER="seeg"
            PM2_APP="boletos-seeg-fibras"
            HEALTH_URL="http://127.0.0.1:3000/"

            cd "$PROJECT_DIR"

            # Garante permissões corretas antes do git pull
            chown -R $APP_USER:$APP_USER "$PROJECT_DIR"

            # Salva commit atual para possível rollback
            PREV_COMMIT=$(su - $APP_USER -c "cd $PROJECT_DIR && git rev-parse HEAD")
            echo "Commit atual: $PREV_COMMIT"

            # Atualiza código garantindo working tree limpa
            su - $APP_USER -c "cd $PROJECT_DIR && git fetch origin main"
            su - $APP_USER -c "cd $PROJECT_DIR && git reset --hard origin/main"
            su - $APP_USER -c "cd $PROJECT_DIR && git clean -fd"
            echo "Código atualizado para origin/main"

            # Verifica se package.json mudou e instala dependências
            PKG_CHANGED=$(su - $APP_USER -c "cd $PROJECT_DIR && git diff HEAD~1 --name-only 2>/dev/null | grep -c package.json" || echo "0")
            if [ "$PKG_CHANGED" != "0" ]; then
              echo "package.json mudou — rodando npm install"
              su - $APP_USER -c "cd $PROJECT_DIR && npm install --production"
            fi

            # Reinicia PM2
            echo "Reiniciando PM2..."
            su - $APP_USER -c "pm2 restart $PM2_APP"
            sleep 5

            # Health check
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$HEALTH_URL" || echo "000")
            echo "Health check: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERRO: Health check falhou — rollback para $PREV_COMMIT"
              su - $APP_USER -c "cd $PROJECT_DIR && git reset --hard $PREV_COMMIT"
              su - $APP_USER -c "pm2 restart $PM2_APP"
              sleep 5
              exit 1
            fi

            NEW_COMMIT=$(su - $APP_USER -c "cd $PROJECT_DIR && git rev-parse --short HEAD")
            echo "Deploy concluído: $PREV_COMMIT -> $NEW_COMMIT"
