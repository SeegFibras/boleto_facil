# Nginx - Reverse Proxy para Sistema de Boletos
# Arquivo final: /etc/nginx/sites-available/boleto-seeg
#
# Este arquivo e a configuracao FINAL (com SSL e restricao de IP).
# Use apos emitir certificado com Certbot.
#
# Ajuste o IP permitido se a recepção sair por outro IP público.

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name boleto.seegfibras.com.br;

    # Necessário para renovação do Certbot (HTTP-01)
    location /.well-known/acme-challenge/ {
        allow all;
    }

    return 301 https://$host$request_uri;
}

# HTTPS — proxy para o Node.js
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name boleto.seegfibras.com.br;

    # Restrição de IP — recepção / rede autorizada
    allow 45.178.112.50;
    deny all;

    # Certificados SSL (gerados pelo Certbot — não alterar manualmente)
    ssl_certificate     /etc/letsencrypt/live/boleto.seegfibras.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boleto.seegfibras.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança de headers adicionais
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Limitar tamanho de body (proteção contra uploads maliciosos)
    client_max_body_size 1m;

    # Proxy para o servidor Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers necessários para trust proxy funcionar no Express
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout maior para geração de PDF
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Logs
    access_log /var/log/nginx/boleto-seeg-access.log;
    error_log  /var/log/nginx/boleto-seeg-error.log warn;
}
